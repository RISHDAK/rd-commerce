<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - R&D Commerce</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">
R&D <span>COMMERCE</span>
</div>

<nav>

</nav>
